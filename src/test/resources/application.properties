
# Application.
spring.application.name=spring

# Artemis.
#spring.artemis.mode=embedded
spring.artemis.mode=native
spring.artemis.broker-url=tcp://localhost:${ARTEMIS_CONTAINER_61616}
spring.artemis.user=test
spring.artemis.password=test

# Logs.
logging.level.org.coldis=DEBUG
#logging.level.org.springframework=TRACE

# Spring AOP.
spring.aop=false
spring.aop.auto=false

# Datasource.
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_CONTAINER_5432}/test
spring.datasource.username=test
spring.datasource.password=test

# JPA.
org.coldis.configuration.persistence.jpa.base-package=org.coldis.library.service.limit.rate.jpa
spring.jpa.hibernate.ddl-auto=create-drop

